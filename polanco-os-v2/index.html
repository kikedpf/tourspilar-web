<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4E9AD1">
  <meta name="description" content="Polanco OS Deal Lab: sistema de análisis y gestión de operaciones de flipping inmobiliario.">
  <meta name="application-name" content="Polanco OS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Polanco OS">
  <title>Polanco OS · Deal Lab</title>
  <link rel="canonical" href="https://kikedpf.github.io/tourspilar-web/">
  <link rel="manifest" href="manifest.webmanifest?v=500">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css?v=500">
  <link rel="stylesheet" href="mobile.css?v=500">
  <link rel="stylesheet" href="deal-prices.css?v=500">
  <script>
    (function(){
      const version='polanco-ui-500';
      if(localStorage.getItem('polanco-ui-version')!==version){
        if('caches' in window){caches.keys().then(keys=>Promise.all(keys.map(key=>caches.delete(key))));}
        if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(reg=>reg.update()));}
        localStorage.setItem('polanco-ui-version',version);
      }
    })();
  </script>
  <style>
    .boot-loading{display:grid;place-items:center;min-height:45vh;text-align:center;color:#617188}
    .boot-loading>div{display:grid;gap:12px;justify-items:center}
    .boot-spinner{width:34px;height:34px;border:3px solid #d6e7f3;border-top-color:#4e9ad1;border-radius:50%;animation:bootspin .8s linear infinite}
    .boot-loading strong{color:#2d6f9f;font-size:15px}.boot-loading small{font-size:12px}
    @keyframes bootspin{to{transform:rotate(360deg)}}
    @media(max-width:920px){
      html,body,.app-shell,.main,#view-root,.finance-command-center{width:100%!important;max-width:100%!important;min-width:0!important;overflow-x:hidden!important}
      #view-root{padding-left:7px!important;padding-right:7px!important}
      .finance-command-center,.finance-command-center *{box-sizing:border-box;min-width:0}
      .finance-command-center{display:grid!important;grid-template-columns:minmax(0,1fr)!important}
      .finance-command-center>.fin-toolbar,.finance-command-center>.fin-hero,.finance-command-center>.fin-columns,.finance-command-center>.fin-note{width:100%!important;max-width:100%!important}
      .fin-toolbar{display:flex!important;align-items:center!important;justify-content:space-between!important;gap:8px!important}
      .fin-toolbar small{max-width:46%!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
      .fin-hero{display:grid!important;grid-template-columns:minmax(0,1.15fr) minmax(0,.85fr)!important;gap:8px!important}
      .fin-hero-side{text-align:right!important}
      .fin-columns{display:grid!important;grid-template-columns:minmax(0,40fr) minmax(0,60fr)!important;gap:8px!important;width:100%!important;max-width:100%!important;overflow:hidden!important}
      .fin-panel,.fin-primary,.fin-source,.fin-flow,.fin-kpis{min-width:0!important;max-width:100%!important}
      .fin-panel{overflow:hidden!important}
      .fin-metric strong,.fin-flow strong,.fin-kpis strong{white-space:normal!important;overflow-wrap:anywhere!important;word-break:break-word!important}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">PI</div>
        <div><strong>POLANCO OS</strong><span>INVERSIÓN INMOBILIARIA</span></div>
      </div>
      <nav class="nav" aria-label="Navegación principal">
        <button class="nav-item active" data-view="dashboard"><span>◫</span>Panel ejecutivo</button>
        <button class="nav-item" data-view="finance"><span>↗</span>Financiación</button>
      </nav>
      <div class="sidebar-footer">
        <div class="connection"><span id="connection-dot"></span><span id="connection-label">Datos locales protegidos</span></div>
        <button class="ghost-btn full" id="install-app" hidden>Instalar aplicación</button>
        <small>v5.0 · Aplicación instalable</small>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="Abrir menú">☰</button>
        <div class="title-block"><h1 id="page-title">Panel ejecutivo</h1><p id="page-subtitle">El capital va a la mejor operación, no a la más bonita.</p></div>
        <div class="context-actions">
          <select id="current-operation" aria-label="Operación activa"></select>
          <button class="icon-btn" id="theme-toggle" title="Cambiar tema">◐</button>
          <button class="secondary-btn" id="new-operation">Nueva</button>
          <button class="primary-btn" id="save-operation">Guardar</button>
        </div>
      </header>
      <div id="view-root" class="content"><div class="boot-loading"><div><span class="boot-spinner"></span><strong>Cargando Polanco OS</strong><small>Preparando la operación y los cálculos…</small></div></div></div>
    </main>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <template id="empty-template"><div class="empty-state"><div class="empty-icon">⌂</div><h3>No hay datos todavía</h3><p>Crea una operación para empezar.</p></div></template>

  <script src="excel-model-migration.js?v=500"></script>
  <script src="engine.js?v=500"></script>
  <script src="app.js?v=500"></script>
  <script src="pwa-install.js?v=500"></script>
  <script>
    (function(){
      'use strict';
      const enhancements=['mobile-dashboard-fixed.js?v=500','tax-breakdown.js?v=500','financing-dashboard.js?v=500'];
      let started=false;
      function loadScript(src){return new Promise((resolve,reject)=>{const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=()=>reject(new Error(src));document.body.appendChild(s);});}
      async function startEnhancements(){
        if(started)return; started=true;
        try{for(const src of enhancements)await loadScript(src);}
        catch(error){console.error('Módulo adicional:',error);}
      }
      window.addEventListener('polanco:app-ready',startEnhancements,{once:true});
      if(window.__POLANCO_APP_READY__)startEnhancements();
    })();
  </script>
  <script>
    (function(){
      'use strict';
      const selector='[data-operation-input][data-input-type="money"]';
      const digits=value=>String(value||'').replace(/\D/g,'').replace(/^0+(?=\d)/,'');
      const dotted=value=>value?value.replace(/\B(?=(\d{3})+(?!\d))/g,'.'):'';
      function countDigits(text,end){return (String(text).slice(0,end).match(/\d/g)||[]).length;}
      function caretForDigits(text,amount){if(amount<=0)return 0;let seen=0;for(let i=0;i<text.length;i++){if(/\d/.test(text[i])&&++seen===amount)return i+1;}return text.length;}
      function formatNow(input){if(!input||!input.matches(selector))return;const old=input.value;const caret=input.selectionStart==null?old.length:input.selectionStart;const before=countDigits(old,caret);const next=dotted(digits(old));if(old!==next)input.value=next;const nextCaret=caretForDigits(next,before);try{input.setSelectionRange(nextCaret,nextCaret);}catch(_){} }
      function delayed(input){requestAnimationFrame(()=>formatNow(input));setTimeout(()=>formatNow(input),0);}
      document.addEventListener('input',event=>formatNow(event.target),true);
      document.addEventListener('keyup',event=>formatNow(event.target),true);
      document.addEventListener('paste',event=>delayed(event.target),true);
      document.addEventListener('focusin',event=>delayed(event.target),true);
      document.addEventListener('beforeinput',event=>delayed(event.target),true);
    })();
  </script>
</body>
</html>
