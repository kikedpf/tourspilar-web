<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4E9AD1">
  <meta name="description" content="Polanco OS Deal Lab: sistema de análisis y gestión de operaciones de flipping inmobiliario.">
  <title>Polanco OS · Deal Lab</title>
  <link rel="manifest" href="manifest.webmanifest?v=380">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css?v=380">
  <link rel="stylesheet" href="mobile.css?v=380">
  <link rel="stylesheet" href="deal-prices.css?v=380">
  <script>
    (function(){
      const version='polanco-ui-380';
      if(localStorage.getItem('polanco-ui-version')!==version){
        if('caches' in window){caches.keys().then(keys=>Promise.all(keys.map(key=>caches.delete(key))));}
        if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(reg=>reg.update()));}
        localStorage.setItem('polanco-ui-version',version);
      }
    })();
  </script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">PI</div>
        <div>
          <strong>POLANCO OS</strong>
          <span>INVERSIÓN INMOBILIARIA</span>
        </div>
      </div>

      <nav class="nav" aria-label="Navegación principal">
        <button class="nav-item active" data-view="dashboard"><span>◫</span>Panel ejecutivo</button>
        <button class="nav-item" data-view="analyzer"><span>◎</span>Analizador</button>
        <button class="nav-item" data-view="opportunities"><span>⌂</span>Oportunidades</button>
        <button class="nav-item" data-view="comparables"><span>≋</span>Comparables</button>
        <button class="nav-item" data-view="renovation"><span>⌁</span>Reforma</button>
        <button class="nav-item" data-view="finance"><span>↗</span>Financiación</button>
        <button class="nav-item" data-view="risk"><span>▦</span>Sensibilidad y riesgos</button>
        <button class="nav-item" data-view="pipeline"><span>⋮</span>Pipeline</button>
        <button class="nav-item" data-view="reports"><span>▤</span>Informes</button>
        <button class="nav-item" data-view="settings"><span>⚙</span>Configuración</button>
      </nav>

      <div class="sidebar-footer">
        <div class="connection"><span id="connection-dot"></span><span id="connection-label">Datos locales protegidos</span></div>
        <button class="ghost-btn full" id="install-app" hidden>Instalar aplicación</button>
        <small>v3.8 · Diseño ejecutivo azul</small>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="Abrir menú">☰</button>
        <div class="title-block">
          <h1 id="page-title">Panel ejecutivo</h1>
          <p id="page-subtitle">El capital va a la mejor operación, no a la más bonita.</p>
        </div>
        <div class="context-actions">
          <select id="current-operation" aria-label="Operación activa"></select>
          <button class="icon-btn" id="theme-toggle" title="Cambiar tema">◐</button>
          <button class="secondary-btn" id="new-operation">Nueva</button>
          <button class="primary-btn" id="save-operation">Guardar</button>
        </div>
      </header>

      <div id="view-root" class="content"></div>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <template id="empty-template">
    <div class="empty-state">
      <div class="empty-icon">⌂</div>
      <h3>No hay datos todavía</h3>
      <p>Crea una operación para empezar.</p>
    </div>
  </template>

  <script src="excel-model-migration.js?v=380"></script>
  <script src="engine.js?v=380"></script>
  <script src="app.js?v=380"></script>
  <script src="mobile-dashboard.js?v=380"></script>
  <script>
    (function(){
      'use strict';
      const selector='[data-price-input]';
      const digits=value=>String(value||'').replace(/\D/g,'').replace(/^0+(?=\d)/,'');
      const dotted=value=>value?value.replace(/\B(?=(\d{3})+(?!\d))/g,'.'):'';

      function countDigits(text,end){return (String(text).slice(0,end).match(/\d/g)||[]).length;}
      function caretForDigits(text,amount){
        if(amount<=0)return 0;
        let seen=0;
        for(let i=0;i<text.length;i++){
          if(/\d/.test(text[i])&&++seen===amount)return i+1;
        }
        return text.length;
      }
      function formatNow(input){
        if(!input||!input.matches(selector))return;
        const old=input.value;
        const caret=input.selectionStart==null?old.length:input.selectionStart;
        const before=countDigits(old,caret);
        const next=dotted(digits(old));
        if(old!==next)input.value=next;
        const nextCaret=caretForDigits(next,before);
        try{input.setSelectionRange(nextCaret,nextCaret);}catch(_){ }
      }
      function delayed(input){
        requestAnimationFrame(()=>formatNow(input));
        setTimeout(()=>formatNow(input),0);
      }

      document.addEventListener('input',event=>formatNow(event.target),true);
      document.addEventListener('keyup',event=>formatNow(event.target),true);
      document.addEventListener('paste',event=>delayed(event.target),true);
      document.addEventListener('focusin',event=>delayed(event.target),true);
      document.addEventListener('beforeinput',event=>delayed(event.target),true);
    })();
  </script>
</body>
</html>
