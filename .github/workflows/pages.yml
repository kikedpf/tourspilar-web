name: Deploy Polanco OS

on:
  push:
    branches: [main]
    paths:
      - 'polanco-os-v2/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Polanco OS
        uses: actions/upload-pages-artifact@v3
        with:
          path: polanco-os-v2

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
